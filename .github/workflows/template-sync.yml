# File: .github/workflows/template-sync.yml

on:
  # cronjob trigger
  schedule:
  - cron: "0 0 1 * *"
  # manual trigger
  workflow_dispatch:
jobs:
  repo-sync:
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
    permissions:
      contents: write
      pull-requests: write

    steps:
      # To use this repository's private action, you must check out the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the same PAT for checkout so subsequent git push operations
          # are authenticated with workflow-file write capability.
          token: ${{ secrets.TEMPLATE_SYNC_PAT }}
        # https://github.com/actions/checkout#usage
        # uncomment if you use submodules within the repository
        # with:
        #   submodules: true

      - name: actions-template-sync
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: alshedivat/al-folio
          upstream_branch: main # defaults to main
          pr_labels: template_sync # defaults to template_sync
          # Use a PAT with repo + workflow scope so template sync can update
          # files under .github/workflows when upstream changes include them.
          source_gh_token: ${{ secrets.TEMPLATE_SYNC_PAT }}
          target_gh_token: ${{ secrets.TEMPLATE_SYNC_PAT }}
